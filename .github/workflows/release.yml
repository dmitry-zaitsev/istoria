name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (ignored if override_version is set)
        type: choice
        options: [patch, minor, major]
        default: patch
      override_version:
        description: Override version (e.g. 0.1.0). Leave blank to use bump.
        required: false
        type: string
      dry_run:
        description: Build only — no commit, tag, or publish.
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: compute
        name: Compute next version
        env:
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.override_version }}
        run: |
          set -euo pipefail
          if [ -n "$OVERRIDE" ]; then
            VERSION="$OVERRIDE"
          else
            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
            case "$BUMP" in
              patch) PAT=$((PAT+1)) ;;
              minor) MIN=$((MIN+1)); PAT=0 ;;
              major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
              *) echo "::error::unknown bump: $BUMP"; exit 1 ;;
            esac
            VERSION="${MAJ}.${MIN}.${PAT}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::invalid version: $VERSION"; exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::tag v$VERSION already exists"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing v$VERSION (dry_run=${{ inputs.dry_run }})"

  build:
    needs: prepare
    runs-on: macos-14
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into source tree
        run: node scripts/set-version.mjs "$VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: aarch64-apple-darwin

      - name: Install sccache + lld + create-dmg
        run: brew install sccache lld create-dmg

      - name: Import Apple cert
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build .app (signed + notarized + stapled)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # `--bundles app` only — DMG is built separately below via
        # create-dmg (tauri's DMG bundler uses AppleScript and can't
        # write .DS_Store in headless CI). Updater tarballs are also
        # built manually below so we control the on-disk layout
        # (unwrapped for the updater plugin, wrapped for brew).
        run: npm run tauri -- build --target $TARGET --bundles app

      - name: Build + sign + notarize + staple DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${TARGET}/release/bundle/macos"
          DMG_OUT="istoria-${VERSION}-${TARGET}.dmg"
          DMG_STABLE="istoria.dmg"
          STAGE_DMG="$(mktemp -d)/src"
          mkdir -p "$STAGE_DMG"
          cp -R "$BUNDLE_DIR/istoria.app" "$STAGE_DMG/"
          # Pre-warm Finder so create-dmg's AppleScript step can drive
          # it. Both tauri's DMG bundler and create-dmg use osascript to
          # set window bg + icon positions, which silently no-ops if
          # Finder isn't running (this is why v1.3.1 shipped without a
          # background — tauri's bundler ran but the AppleScript half
          # was a no-op).
          osascript -e 'tell application "Finder" to activate' >/dev/null 2>&1 || true
          create-dmg \
            --volname istoria \
            --background src-tauri/icons/dmg-background.png \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 110 \
            --icon istoria.app 180 200 \
            --app-drop-link 480 200 \
            --no-internet-enable \
            "dist/${DMG_OUT}" "$STAGE_DMG/"
          # Verify .DS_Store landed — without it the DMG has no bg or
          # icon positions, which is the regression we're fixing.
          MOUNT=$(hdiutil attach -nobrowse -readonly "dist/${DMG_OUT}" | tail -1 | awk '{print $NF}')
          test -f "$MOUNT/.DS_Store" || { echo "::error::DMG missing .DS_Store — Finder layout not applied"; hdiutil detach "$MOUNT"; exit 1; }
          hdiutil detach "$MOUNT"
          codesign --sign "$APPLE_SIGNING_IDENTITY" --timestamp "dist/${DMG_OUT}"
          xcrun notarytool submit "dist/${DMG_OUT}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/${DMG_OUT}"
          cp "dist/${DMG_OUT}" "dist/${DMG_STABLE}"

      - name: Package brew + updater tarballs, emit latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${TARGET}/release/bundle/macos"

          # Brew tarball: istoria.app wrapped in a parent dir so brew's
          # extract-and-chdir strips the wrapper, not the .app itself.
          # Without this brew enters istoria.app/ and `prefix.install
          # "istoria.app"` fails with ENOENT.
          BREW_ARTIFACT="istoria-${VERSION}-${TARGET}.app.tar.gz"
          STAGE="$(mktemp -d)"
          mkdir "$STAGE/istoria-${VERSION}"
          cp -R "$BUNDLE_DIR/istoria.app" "$STAGE/istoria-${VERSION}/"
          tar -czf "dist/${BREW_ARTIFACT}" -C "$STAGE" "istoria-${VERSION}"

          # Updater tarball: same .app, but with istoria.app at the
          # tarball root — that's the layout tauri-plugin-updater expects
          # on extract. The wrapped brew layout corrupts the updater
          # install (v1.3.1 bug).
          UPDATER_ARTIFACT="istoria-${VERSION}-${TARGET}.updater.tar.gz"
          UPSTAGE="$(mktemp -d)"
          cp -R "$BUNDLE_DIR/istoria.app" "$UPSTAGE/"
          tar -czf "dist/${UPDATER_ARTIFACT}" -C "$UPSTAGE" "istoria.app"
          npm run tauri -- signer sign "dist/${UPDATER_ARTIFACT}"
          SIG_CONTENT="$(cat "dist/${UPDATER_ARTIFACT}.sig")"

          DMG_OUT="istoria-${VERSION}-${TARGET}.dmg"
          DMG_STABLE="istoria.dmg"

          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > dist/latest.json <<EOF
          {
            "version": "v${VERSION}",
            "notes": "Release v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/dmitry-zaitsev/istoria-releases/releases/download/v${VERSION}/${UPDATER_ARTIFACT}"
              }
            }
          }
          EOF

          (cd dist && shasum -a 256 \
            "$BREW_ARTIFACT" \
            "$UPDATER_ARTIFACT" "${UPDATER_ARTIFACT}.sig" \
            "$DMG_OUT" "$DMG_STABLE" \
            latest.json > SHA256SUMS)

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        # default GITHUB_TOKEN persists in .git/config so we can push back

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Bump + commit + tag in source repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/set-version.mjs "$VERSION"
          git config user.name "istoria-release-bot"
          git config user.email "noreply@github.com"
          git add package.json Cargo.toml src-tauri/tauri.conf.json
          if git diff --cached --quiet; then
            echo "version files already at $VERSION"
          else
            git commit -m "release: v${VERSION}"
          fi
          git tag "v${VERSION}"
          git push origin HEAD "v${VERSION}"

      - name: Create release on dmitry-zaitsev/istoria-releases
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASES_PAT }}
        run: |
          set -euo pipefail
          cd dist
          gh release create "v${VERSION}" \
            --repo dmitry-zaitsev/istoria-releases \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            *.tar.gz *.tar.gz.sig *.dmg latest.json SHA256SUMS

      - name: Compute formula sha
        id: formula
        run: |
          set -euo pipefail
          cd dist
          ARM_FILE="istoria-${VERSION}-aarch64-apple-darwin.app.tar.gz"
          arm_sha=$(awk -v f="$ARM_FILE" '$2==f {print $1}' SHA256SUMS)
          if [ -z "$arm_sha" ]; then echo "::error::missing sha"; cat SHA256SUMS; exit 1; fi
          echo "arm_sha=$arm_sha" >> "$GITHUB_OUTPUT"

      - name: Render formula
        env:
          ARM_SHA: ${{ steps.formula.outputs.arm_sha }}
        run: |
          set -euo pipefail
          export VERSION ARM_SHA
          envsubst '${VERSION} ${ARM_SHA}' \
            < .github/release-assets/Formula.istoria.rb.tmpl \
            > /tmp/istoria.rb
          echo "--- rendered formula ---"
          cat /tmp/istoria.rb

      - name: Push formula to dmitry-zaitsev/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASES_PAT }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/dmitry-zaitsev/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/istoria.rb /tmp/tap/Formula/istoria.rb
          cd /tmp/tap
          git config user.name "istoria-release-bot"
          git config user.email "noreply@github.com"
          git add Formula/istoria.rb
          if git diff --cached --quiet; then
            echo "no formula changes"
          else
            git commit -m "istoria ${VERSION}"
            git push
          fi
