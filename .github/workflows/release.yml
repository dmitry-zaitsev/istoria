name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build only, do not publish
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Verify versions match
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Cargo.toml | head -1)
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "tag=$VERSION pkg=$PKG cargo=$CARGO tauri=$TAURI"
          for v in "$PKG" "$CARGO" "$TAURI"; do
            if [[ "$v" != "$VERSION" ]]; then
              echo "::error::version mismatch — tag=$VERSION pkg=$PKG cargo=$CARGO tauri=$TAURI"
              exit 1
            fi
          done

  build:
    needs: preflight
    runs-on: macos-14
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: aarch64-apple-darwin

      - name: Import Apple cert
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build (signed + notarized)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build --target $TARGET --bundles app

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${TARGET}/release/bundle/macos"
          ARTIFACT="istoria-${VERSION}-${TARGET}.app.tar.gz"
          tar -czf "dist/${ARTIFACT}" -C "$BUNDLE_DIR" istoria.app
          (cd dist && shasum -a 256 "$ARTIFACT" > SHA256SUMS)

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: [preflight, build]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ secrets.GH_RELEASES_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create release on dmitry-zaitsev/istoria-releases
        run: |
          set -euo pipefail
          cd dist
          gh release create "v${VERSION}" \
            --repo dmitry-zaitsev/istoria-releases \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            *.tar.gz SHA256SUMS

      - name: Compute formula values
        id: formula
        run: |
          set -euo pipefail
          cd dist
          ARM_FILE="istoria-${VERSION}-aarch64-apple-darwin.app.tar.gz"
          arm_sha=$(awk -v f="$ARM_FILE" '$2==f {print $1}' SHA256SUMS)
          if [ -z "$arm_sha" ]; then echo "::error::missing sha in SHA256SUMS"; cat SHA256SUMS; exit 1; fi
          echo "arm_sha=$arm_sha" >> "$GITHUB_OUTPUT"

      - name: Render formula
        env:
          ARM_SHA: ${{ steps.formula.outputs.arm_sha }}
        run: |
          set -euo pipefail
          export VERSION ARM_SHA
          envsubst '${VERSION} ${ARM_SHA}' \
            < .github/release-assets/Formula.istoria.rb.tmpl \
            > /tmp/istoria.rb
          echo "--- rendered formula ---"
          cat /tmp/istoria.rb

      - name: Push formula to dmitry-zaitsev/homebrew-tap
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/dmitry-zaitsev/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/istoria.rb /tmp/tap/Formula/istoria.rb
          cd /tmp/tap
          git config user.name "istoria-release-bot"
          git config user.email "noreply@github.com"
          git add Formula/istoria.rb
          if git diff --cached --quiet; then
            echo "no formula changes"
            exit 0
          fi
          git commit -m "istoria ${VERSION}"
          git push
