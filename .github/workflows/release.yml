name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build only, do not publish
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Verify versions match
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' Cargo.toml | head -1)
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "tag=$VERSION pkg=$PKG cargo=$CARGO tauri=$TAURI"
          for v in "$PKG" "$CARGO" "$TAURI"; do
            if [[ "$v" != "$VERSION" ]]; then
              echo "::error::version mismatch — tag=$VERSION pkg=$PKG cargo=$CARGO tauri=$TAURI"
              exit 1
            fi
          done

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            label: aarch64-apple-darwin
            kind: macos
          - target: x86_64-apple-darwin
            os: macos-13
            label: x86_64-apple-darwin
            kind: macos
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            label: x86_64-linux
            kind: linux
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}

      - name: Linux deps
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Import Apple cert
        if: matrix.kind == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build (macOS, signed + notarized)
        if: matrix.kind == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles app

      - name: Build (Linux, no bundle)
        if: matrix.kind == 'linux'
        run: npm run tauri -- build --target ${{ matrix.target }} --no-bundle

      - name: Package macOS
        if: matrix.kind == 'macos'
        run: |
          set -euo pipefail
          mkdir -p dist
          BUNDLE_DIR="target/${{ matrix.target }}/release/bundle/macos"
          ARTIFACT="istoria-${VERSION}-${{ matrix.label }}.app.tar.gz"
          tar -czf "dist/${ARTIFACT}" -C "$BUNDLE_DIR" istoria.app
          (cd dist && shasum -a 256 "$ARTIFACT" > "SHA256SUMS-${{ matrix.label }}")

      - name: Package Linux
        if: matrix.kind == 'linux'
        run: |
          set -euo pipefail
          mkdir -p dist
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/istoria "$STAGE/"
          [ -f LICENSE ] && cp LICENSE "$STAGE/" || true
          [ -f README.md ] && cp README.md "$STAGE/" || true
          ARTIFACT="istoria-${VERSION}-${{ matrix.label }}.tar.gz"
          tar -czf "dist/${ARTIFACT}" -C "$STAGE" .
          (cd dist && sha256sum "$ARTIFACT" > "SHA256SUMS-${{ matrix.label }}")

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          path: dist/
          if-no-files-found: error

  publish:
    needs: [preflight, build]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ secrets.GH_RELEASES_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          set -euo pipefail
          cd dist
          cat SHA256SUMS-* > SHA256SUMS
          rm SHA256SUMS-*
          ls -la

      - name: Create release on dmitry-zaitsev/istoria-releases
        run: |
          set -euo pipefail
          cd dist
          gh release create "v${VERSION}" \
            --repo dmitry-zaitsev/istoria-releases \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            *.tar.gz SHA256SUMS

      - name: Compute formula values
        id: formula
        run: |
          set -euo pipefail
          cd dist
          ARM_FILE="istoria-${VERSION}-aarch64-apple-darwin.app.tar.gz"
          INTEL_FILE="istoria-${VERSION}-x86_64-apple-darwin.app.tar.gz"
          LINUX_FILE="istoria-${VERSION}-x86_64-linux.tar.gz"
          arm_sha=$(awk -v f="$ARM_FILE" '$2==f {print $1}' SHA256SUMS)
          intel_sha=$(awk -v f="$INTEL_FILE" '$2==f {print $1}' SHA256SUMS)
          linux_sha=$(awk -v f="$LINUX_FILE" '$2==f {print $1}' SHA256SUMS)
          for s in "$arm_sha" "$intel_sha" "$linux_sha"; do
            if [ -z "$s" ]; then echo "::error::missing sha in SHA256SUMS"; cat SHA256SUMS; exit 1; fi
          done
          {
            echo "arm_sha=$arm_sha"
            echo "intel_sha=$intel_sha"
            echo "linux_sha=$linux_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Render formula
        env:
          ARM_SHA: ${{ steps.formula.outputs.arm_sha }}
          INTEL_SHA: ${{ steps.formula.outputs.intel_sha }}
          LINUX_SHA: ${{ steps.formula.outputs.linux_sha }}
        run: |
          set -euo pipefail
          export VERSION ARM_SHA INTEL_SHA LINUX_SHA
          envsubst '${VERSION} ${ARM_SHA} ${INTEL_SHA} ${LINUX_SHA}' \
            < .github/release-assets/Formula.istoria.rb.tmpl \
            > /tmp/istoria.rb
          echo "--- rendered formula ---"
          cat /tmp/istoria.rb

      - name: Push formula to dmitry-zaitsev/homebrew-tap
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/dmitry-zaitsev/homebrew-tap.git" /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/istoria.rb /tmp/tap/Formula/istoria.rb
          cd /tmp/tap
          git config user.name "istoria-release-bot"
          git config user.email "noreply@github.com"
          git add Formula/istoria.rb
          if git diff --cached --quiet; then
            echo "no formula changes"
            exit 0
          fi
          git commit -m "istoria ${VERSION}"
          git push
