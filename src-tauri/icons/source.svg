<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3aa3da"/>
      <stop offset="1" stop-color="#1a5f8b"/>
    </linearGradient>
  </defs>
  <!-- macOS-style rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Subtle inner shadow on top edge -->
  <rect x="0" y="0" width="1024" height="220" rx="220" ry="220" fill="white" opacity="0.07"/>

  <!-- Three horizontal "log lines" of decreasing length, like a terminal stream -->
  <g fill="white">
    <rect x="200" y="320" width="624" height="56" rx="28"/>
    <rect x="200" y="448" width="468" height="56" rx="28" opacity="0.85"/>
    <rect x="200" y="576" width="540" height="56" rx="28" opacity="0.7"/>
  </g>

  <!-- Blinking cursor block on the last line -->
  <rect x="200" y="704" width="56" height="56" rx="8" fill="white"/>
  <rect x="280" y="720" width="220" height="32" rx="16" fill="white" opacity="0.55"/>
</svg>
