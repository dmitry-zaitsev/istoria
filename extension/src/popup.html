<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>istoria</title>
    <style>
      :root {
        --surface: #ffffff;
        --surface-2: #fafbfc;
        --ink: #0f172a;
        --ink-2: #1f2937;
        --muted: #64748b;
        --muted-2: #94a3b8;
        --line-soft: #eef1f5;
        --brand: #4ea8e0;
        --ok-fg: #0f7a4a;
        --warn-fg: #a65d12;
        --rec: #dc2626;
        --rec-hover: #b91c1c;
        --ui: "Inter", -apple-system, system-ui, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--surface);
        color: var(--ink);
        font-family: var(--ui);
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        width: 280px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px 10px;
        border-bottom: 1px solid var(--line-soft);
      }
      .title {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .title .brand {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
      .title .sub {
        font-size: 10.5px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted-2);
        box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.15);
      }
      .dot.live {
        background: var(--rec);
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.18);
        animation: pulse 1.4s ease-in-out infinite;
      }
      .dot.warn {
        background: var(--warn-fg);
        box-shadow: 0 0 0 3px rgba(166, 93, 18, 0.15);
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.18);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(220, 38, 38, 0.05);
        }
      }

      .body {
        padding: 12px 14px 14px;
        background: var(--surface-2);
      }

      .btn {
        appearance: none;
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.12s ease;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .btn-rec {
        background: var(--rec);
        color: #fff;
      }
      .btn-rec:hover:not(:disabled) {
        background: var(--rec-hover);
      }
      .btn-rec .icon {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25);
      }
      .btn-stop {
        background: #1f2937;
        color: #fff;
      }
      .btn-stop:hover:not(:disabled) {
        background: #0f172a;
      }
      .btn-stop .icon {
        width: 9px;
        height: 9px;
        background: #fff;
        border-radius: 1px;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--ink-2);
        line-height: 1.4;
      }
      .status .hint {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        font-family: var(--mono);
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">
        <span class="brand">istoria</span>
        <span class="sub">browser logs</span>
      </div>
      <span id="dot" class="dot"></span>
    </header>

    <div class="body">
      <button id="recBtn" class="btn btn-rec" disabled>
        <span class="icon"></span>
        <span id="recLabel">Loading…</span>
      </button>
      <div class="status">
        <span id="statusText"></span>
        <span id="statusHint" class="hint"></span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
